<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>🐍 贪吃蛇</h1>
    <div class="panel">
      <span>分数：<strong id="score">0</strong></span>
      <span>最高分：<strong id="best">0</strong></span>
      <button id="restart">重新开始</button>
    </div>
    <canvas id="game" width="480" height="480" aria-label="snake game"></canvas>
    <p class="tip">方向键 / WASD 控制，空格暂停</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
